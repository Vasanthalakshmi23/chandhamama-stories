<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chandamama Kathalu - Browse</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
        nav { background: #1a1a2e; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; }
        nav a { color: #eee; text-decoration: none; margin-right: 1.5rem; font-size: 0.95rem; }
        nav a:hover { color: #e94560; }
        nav .brand { font-size: 1.3rem; font-weight: 700; color: #e94560; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 1rem; }
        .btn { display: inline-block; padding: 0.6rem 1.2rem; border-radius: 8px; text-decoration: none; font-size: 0.9rem; cursor: pointer; border: none; }
        .btn-primary { background: #e94560; color: white; }
        .btn-primary:hover { background: #d63851; }
        .btn-secondary { background: #16213e; color: white; }
        .btn-secondary:hover { background: #1a1a2e; }
        .btn-outline { background: transparent; border: 2px solid #e94560; color: #e94560; }
        .btn-outline:hover { background: #e94560; color: white; }
        input, select { padding: 0.6rem 1rem; border: 2px solid #ddd; border-radius: 8px; font-size: 0.95rem; width: 100%; }
        input:focus { outline: none; border-color: #e94560; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f8f8; font-weight: 600; }
        tr:hover { background: #fafafa; }
        .pagination { display: flex; justify-content: center; gap: 0.5rem; margin-top: 1.5rem; }
        .pagination a, .pagination span { padding: 0.5rem 0.8rem; border-radius: 6px; text-decoration: none; }
        .pagination a { background: #eee; color: #333; }
        .pagination a:hover { background: #ddd; }
        .pagination .active { background: #e94560; color: white; }
        .badge { display: inline-block; padding: 0.25rem 0.6rem; border-radius: 20px; font-size: 0.75rem; background: #eee; }
        mark { background: #ffe066; padding: 0 2px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
        .filters { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .filters select { width: auto; min-width: 150px; }
        .search-box { display: flex; gap: 0.5rem; }
        .search-box input { flex: 1; }
        .search-box button { flex-shrink: 0; }
        .footer { text-align: center; padding: 2rem; color: #888; font-size: 0.85rem; }
        .alert { background: #fff3cd; border: 1px solid #ffeeba; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
        @media (max-width: 768px) {
            nav { flex-direction: column; gap: 0.5rem; }
            .filters { flex-direction: column; }
            .filters select { width: 100%; }
        }
        .spin { display: inline-block; width: 1.5rem; height: 1.5rem; border: 3px solid #eee; border-top-color: #e94560; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .flex { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
    </style>
</head>
<body>
    <nav>
        <div>
            <a href="/" class="brand">చందమామ కథలు</a>
            <a href="/">Home</a>
            <a href="/search">Search</a>
        </div>
        <div class="flex" style="gap:0.5rem">
            <a href="/api/download-all" class="btn btn-secondary" style="font-size:0.8rem;padding:0.4rem 0.8rem">Download All</a>
            <a href="/api/download-database" class="btn btn-outline" style="font-size:0.8rem;padding:0.4rem 0.8rem">Download DB</a>
        </div>
    </nav>
    <div class="container">
        <h2 style="margin-bottom:1rem">Browse Stories</h2>

        <div class="filters">
            <select id="yearFilter" onchange="loadStories(1)">
                <option value="">All Years</option>
            </select>
            <select id="monthFilter" onchange="loadStories(1)">
                <option value="">All Months</option>
            </select>
        </div>

        <div id="stats" style="margin-bottom:1rem"></div>
        <div id="storiesGrid" class="grid"></div>
        <div class="pagination" id="pagination"></div>
        <div id="loading" style="text-align:center;padding:3rem"><div class="spin"></div></div>
    </div>
    <div class="footer">Chandamama Kathalu Dataset &mdash; Search and Browse</div>

    <script>
    let currentPage = 1;
    let currentYear = '';
    let currentMonth = '';

    async function loadFilters() {
        const [yearsRes, monthsRes] = await Promise.all([
            fetch('/api/years'),
            fetch('/api/months')
        ]);
        const years = await yearsRes.json();
        const months = await monthsRes.json();
        const yearSel = document.getElementById('yearFilter');
        years.years.forEach(y => { yearSel.innerHTML += '<option value="'+y+'">'+y+'</option>'; });
        const monthSel = document.getElementById('monthFilter');
        const monthNames = {"jan":"Jan","feb":"Feb","mar":"Mar","apr":"Apr","may":"May","jun":"Jun","jul":"Jul","aug":"Aug","sep":"Sep","oct":"Oct","nov":"Nov","dec":"Dec"};
        months.months.forEach(m => { monthSel.innerHTML += '<option value="'+m+'">'+(monthNames[m]||m)+'</option>'; });
    }

    async function loadStories(page) {
        currentPage = page;
        currentYear = document.getElementById('yearFilter').value;
        currentMonth = document.getElementById('monthFilter').value;
        document.getElementById('loading').style.display = 'block';
        document.getElementById('storiesGrid').innerHTML = '';
        document.getElementById('pagination').innerHTML = '';

        let url = '/api/stories?page='+page+'&per_page=30';
        if (currentYear) url += '&year='+currentYear;
        if (currentMonth) url += '&month='+currentMonth;

        const res = await fetch(url);
        const data = await res.json();
        document.getElementById('loading').style.display = 'none';

        document.getElementById('stats').textContent = 'Showing '+data.results.length+' of '+data.total+' stories';

        const grid = document.getElementById('storiesGrid');
        grid.innerHTML = data.results.map(s => {
            return '<div class="card">'+
                '<h3 style="margin-bottom:0.5rem"><a href="/story/'+s.id+'" style="color:#e94560;text-decoration:none">'+s.year+' '+s.month+' - Story '+s.story_number+'</a></h3>'+
                '<div class="flex" style="gap:0.5rem">'+
                '<span class="badge">'+s.page_count+' pages</span>'+
                '<span class="badge">'+s.folder_name+'</span>'+
                '</div></div>';
        }).join('');

        const pag = document.getElementById('pagination');
        const totalPages = data.total_pages;
        pag.innerHTML = '';
        if (currentPage > 1) pag.innerHTML += '<a href="#" onclick="loadStories('+(currentPage-1)+');return false">Prev</a>';
        for (let p = 1; p <= totalPages; p++) {
            if (p === currentPage) pag.innerHTML += '<span class="active">'+p+'</span>';
            else if (p <= 3 || p > totalPages - 3 || Math.abs(p - currentPage) <= 2)
                pag.innerHTML += '<a href="#" onclick="loadStories('+p+');return false">'+p+'</a>';
        }
        if (currentPage < totalPages) pag.innerHTML += '<a href="#" onclick="loadStories('+(currentPage+1)+');return false">Next</a>';
    }

    loadFilters();
    loadStories(1);
    </script>
</body>
</html>
