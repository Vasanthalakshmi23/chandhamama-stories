services:
  - type: web
    name: chandamama-kathalu
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chandamama-db
          property: connectionString

 databases:
  - name: chandamama-db
    plan: free
