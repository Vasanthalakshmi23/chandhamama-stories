databases:
  - name: chandamama-db
    plan: free

services:
  - type: web
    name: chandamama-kathalu
    env: python
    plan: free
    region: singapore

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chandamama-db
          property: connectionString
